name: Release Assets

on:
  workflow_call:
    inputs:
      tag:
        description: Release tag to build and upload assets for. Accepts `v0.2.3`, `tag=v0.2.3`, or `refs/tags/v0.2.3`.
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build and upload assets for. Accepts `v0.2.3`, `tag=v0.2.3`, or `refs/tags/v0.2.3`.
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-assets-${{ inputs.tag || github.event.inputs.tag }}
  cancel-in-progress: false

jobs:
  resolve_tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.normalize.outputs.tag }}

    steps:
      - name: Normalize release tag input
        id: normalize
        env:
          RAW_TAG: ${{ inputs.tag || github.event.inputs.tag }}
        run: |
          tag="${RAW_TAG}"

          while :; do
            normalized="${tag#tag=}"
            if [ "$normalized" != "$tag" ]; then
              tag="$normalized"
              continue
            fi

            normalized="${tag#refs/tags/}"
            if [ "$normalized" != "$tag" ]; then
              tag="$normalized"
              continue
            fi

            break
          done

          if [ -z "$tag" ]; then
            echo "Release tag input must not be empty" >&2
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"

  build:
    needs: resolve_tag
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            asset_suffix: linux-x86_64
          - runner: ubuntu-24.04-arm
            asset_suffix: linux-aarch64

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Check out release tag
        uses: actions/checkout@v4.3.1
        with:
          ref: ${{ needs.resolve_tag.outputs.tag }}

      - name: Install Rust toolchain
        run: |
          if ! command -v rustup >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
          fi
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          "$HOME/.cargo/bin/rustup" toolchain install stable --profile minimal
          "$HOME/.cargo/bin/rustup" default stable

      - name: Cache Cargo dependencies
        uses: actions/cache@v4.3.0
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.asset_suffix }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.asset_suffix }}-cargo-

      - name: Build release binary
        run: cargo build --release --locked

      - name: Package release assets
        env:
          TAG: ${{ needs.resolve_tag.outputs.tag }}
          ASSET_SUFFIX: ${{ matrix.asset_suffix }}
        run: |
          package_dir="git-crypt-${TAG}-${ASSET_SUFFIX}"
          mkdir -p "$package_dir"
          cp target/release/git-crypt "$package_dir/"
          cp README.md LICENSE "$package_dir/"
          tar -czf "${package_dir}.tar.gz" "$package_dir"
          sha256sum "${package_dir}.tar.gz" > "${package_dir}.tar.gz.sha256"

      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.resolve_tag.outputs.tag }}
          ASSET_SUFFIX: ${{ matrix.asset_suffix }}
        run: |
          package_dir="git-crypt-${TAG}-${ASSET_SUFFIX}"
          gh release upload "$TAG" "${package_dir}.tar.gz" "${package_dir}.tar.gz.sha256" --clobber
