name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4.3.1

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y jq gnupg

      - name: Install Rust toolchain
        run: |
          if ! command -v rustup >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
          fi
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          "$HOME/.cargo/bin/rustup" toolchain install stable --profile minimal
          "$HOME/.cargo/bin/rustup" default stable

      - name: Cache Cargo dependencies
        uses: actions/cache@v4.3.0
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run Rust tests
        run: cargo test --quiet --locked

      - name: Run integration test script
        run: ./test.sh

  copilot-support:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4.3.1

      - name: Run Copilot support tests
        run: node --test .github/hooks/postToolUse/main.test.mjs .github/scripts/*.test.mjs
